# --- Configurações Gerais ---
set -g default-terminal "tmux-256color"
set -g mouse on
setw -g mode-keys vi
set -g status-position top
set -g base-index 1

# --- Plugins (Definir primeiro) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux' # Usar a versão padrão para evitar bugs de tags

# --- Configuração do Tema Catppuccin (V2) ---
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Cores dinâmicas para o ícone de sessão
set -g @catppuccin_status_session_icon_bg "#{?pane_in_mode,yellow,#{?client_prefix,red,blue}}"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "

set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_host}"

set -g @catppuccin_directory_text " #{pane_current_path}"

# --- Configuração do Prefixo e Atalhos (Obrigatório após o tema) ---
unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

# --- Divisão de Panes com Ctrl + Alt + Setas (Sem precisar do prefixo) ---

# Nova pane Vertical (lado a lado): Ctrl + Alt + Seta Direita
bind -n C-M-Right split-window -h -c "#{pane_current_path}"

# Nova pane Horizontal (uma em cima da outra): Ctrl + Alt + Seta Baixo
bind -n C-M-Down split-window -v -c "#{pane_current_path}"

# Entrar no modo de cópia com Ctrl + Alt + Seta para Cima (sem prefixo)
bind -n C-M-Up copy-mode

# Listar janelas (modo interativo) com Ctrl + Alt + Seta Esquerda
bind -n C-M-Left choose-tree -w

# Ajuda (listar atalhos) com F1 (sem prefixo)
bind -n F1 list-keys

# Renomear sessão com F2 (sem prefixo)
bind -n F2 command-prompt 'rename-session "%%"'

# Renomear janela com F3 (sem prefixo)
bind -n F3 command-prompt 'rename-window "%%"'

# Criar nova sessão (prefixo + Ctrl+S)
bind C-s new-session

# Criar nova janela (prefixo + Ctrl+W)
bind C-w new-window

# Copiar paste buffer do tmux para clipboard do Windows (prefixo + Ctrl+C)
bind C-c run "tmux show-buffer | clip.exe"

# Recarregar configuração com F5 (sem prefixo)
bind -n F4 source-file ~/.config/tmux/tmux.conf

# Inicializa o TPM (Sempre a última linha)
run '~/.config/tmux/plugins/tpm/tpm'
